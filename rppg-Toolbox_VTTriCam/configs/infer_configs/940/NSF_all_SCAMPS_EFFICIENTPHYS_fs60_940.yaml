BASE: ['']
TOOLBOX_MODE: "only_test"      # "train_and_test"  or "only_test" #NSF_PURE_UBFC-PHYS_PHYSNET_BASIC.yaml
TEST:
  METRICS: ['MAE', 'RMSE', 'MAPE', 'Pearson', 'SNR', 'BA']
  USE_LAST_EPOCH: False
  OUTPUT_SAVE_DIR:  "/projects/abbott_lab/BVP/BVP/rppg-toolbox_new/rPPG-Toolbox/Outputs"
  DATA:
    FS: 60
    DATASET: NSF_940
    DO_PREPROCESS: True#False#False#True                  # if first time, should be true
    DATA_FORMAT: NDCHW
    DATA_PATH: "/projects/abbott_lab/BVP/BVP/rPPG-Toolbox-main/newFolder_all_vids/all"                     # Raw dataset path, need to be updated
    CACHED_PATH: "/projects/cesca-cv/rppg_preproc"    # Processed dataset save path, need to be updated
    EXP_DATA_NAME: "NSF_all_SCAMPS_EFFICIENTPHYS_fs60_940" 
    BEGIN: 0.0
    END: 1.0
    PREPROCESS:
      DATA_TYPE: [ 'Standardized']
      LABEL_TYPE: DiffNormalized
      DO_CHUNK: True#True
      CHUNK_LENGTH: 360   #only support for factor of 512 misstake maybe
      CROP_FACE:
        DO_CROP_FACE: True
        BACKEND: 'HC'    # HC for Haar Cascade, RF for RetinaFace
        USE_LARGE_FACE_BOX: True
        LARGE_BOX_COEF: 1.5
        DETECTION:
          DO_DYNAMIC_DETECTION: False
          DYNAMIC_DETECTION_FREQUENCY : 60
          USE_MEDIAN_FACE_BOX: False    # This should be used ONLY if dynamic detection is used
      RESIZE:
        H: 72#2000
        W: 72#2000
DEVICE: cuda:0
NUM_OF_GPU_TRAIN: 1
LOG:
  PATH: runs/exp
MODEL:
  DROP_RATE: 0.2
  NAME: EfficientPhys
  EFFICIENTPHYS:
    FRAME_DEPTH: 10
INFERENCE:
  BATCH_SIZE: 4
  EVALUATION_METHOD: 'FFT'        # "FFT" or "peak detection"
  EVALUATION_WINDOW:
    USE_SMALLER_WINDOW: False        # Change this if you'd like an evaluation window smaller than the test video length
    WINDOW_SIZE: 10        # In seconds
  MODEL_PATH:   "./final_model_release/SCAMPS_EfficientPhys.pth"