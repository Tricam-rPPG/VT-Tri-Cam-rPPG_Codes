BASE: ['']
TOOLBOX_MODE: "only_test"      # "train_and_test"  or "only_test"
TEST:
  METRICS: ['MAE', 'RMSE', 'MAPE', 'Pearson', 'SNR', 'BA']
  USE_LAST_EPOCH: True
  OUTPUT_SAVE_DIR:  "/projects/abbott_lab/BVP/BVP/rppg-toolbox_new/rPPG-Toolbox/Outputs"
  DATA:
    FS: 60# I used 60 for when I first did it mistakenly
    DATASET: NSF
    DO_PREPROCESS: True#True#T#False#False#True                  # if first time, should be true
    DATA_FORMAT: NDCHW
    DATA_PATH: "/projects/abbott_lab/CCI_data/Training_ECCV_RGB/TrainVids"                     # Raw dataset path, need to be updated
    CACHED_PATH: "/projects/cesca-cv/rppg_preproc"    # Processed dataset save path, need to be updated
    EXP_DATA_NAME: "NSF_TrainVids_PURE_TSCAN_fs60_RGB" 
    BEGIN: 0.0
    END: 1.0
    PREPROCESS:
      DATA_TYPE: [ 'DiffNormalized','Standardized' ]
      LABEL_TYPE: DiffNormalized
      DO_CHUNK: True
      CHUNK_LENGTH: 360 #original-210 # 6 seconds of frames
      CROP_FACE:
        DO_CROP_FACE: True
        BACKEND: 'HC'    # HC for Haar Cascade, RF for RetinaFace
        USE_LARGE_FACE_BOX: True
        LARGE_BOX_COEF: 1.5
        DETECTION:
          DO_DYNAMIC_DETECTION: False
          DYNAMIC_DETECTION_FREQUENCY : 60
          USE_MEDIAN_FACE_BOX: False    # This should be used ONLY if dynamic detection is used
      RESIZE:
        H: 72
        W: 72
DEVICE: cuda:0
NUM_OF_GPU_TRAIN: 1
LOG:
  PATH: runs/exp
MODEL:
  DROP_RATE: 0.2
  NAME: Tscan
  TSCAN:
    FRAME_DEPTH: 10
INFERENCE:
  BATCH_SIZE: 4
  EVALUATION_METHOD: FFT        # "FFT" or "peak detection"
  EVALUATION_WINDOW:
    USE_SMALLER_WINDOW: False        # Change this if you'd like an evaluation window smaller than the test video length
    WINDOW_SIZE: 10        # In seconds
  MODEL_PATH: "./final_model_release/PURE_TSCAN.pth"
