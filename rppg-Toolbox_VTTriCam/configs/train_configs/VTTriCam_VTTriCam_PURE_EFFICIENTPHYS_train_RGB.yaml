BASE: ['']
TOOLBOX_MODE: "train_and_test"      # "train_and_test"  or "only_test"
TRAIN:
  BATCH_SIZE: 4
  EPOCHS: 30
  LR: 9e-3
  MODEL_FILE_NAME: VTTriCam_VTTriCam_PURE_EFFICIENTPHYS
  PLOT_LOSSES_AND_LR: True
  DATA:
    FS: 60
    DATASET: VTTriCam
    DO_PREPROCESS: False#False               # if first time, should be true
    DATA_FORMAT: NDCHW
    DATA_PATH: "/projects/abbott_lab/BVP/BVP/rPPG-Toolbox-main/newFolder_all_vids/all"                     # Raw dataset path, need to be updated
    CACHED_PATH: "/projects/cesca-cv/rppg_preproc"    # Processed dataset save path, need to be updated
    EXP_DATA_NAME: "VTTriCam_VTTriCam_PURE_EFFICIENTPHYS_train_RGB"
    BEGIN: 0.0
    END: 0.8
    PREPROCESS:
      DATA_TYPE: ['Standardized']
      DATA_AUG: ['None']    # 'None' or 'Motion' is supported, used if the data path points to an augmented dataset or requires augmentation
      LABEL_TYPE: DiffNormalized
      DO_CHUNK: True
      CHUNK_LENGTH: 360
      CROP_FACE:
        DO_CROP_FACE: True
        BACKEND: 'HC'    # HC for Haar Cascade, Y5F for YOLO5Face
        USE_LARGE_FACE_BOX: True
        LARGE_BOX_COEF: 1.5
        DETECTION:
          DO_DYNAMIC_DETECTION: False
          DYNAMIC_DETECTION_FREQUENCY : 30
          USE_MEDIAN_FACE_BOX: False    # This should be used ONLY if dynamic detection is used
      RESIZE:
        H: 72
        W: 72
VALID:
  DATA:
    FS: 60
    DATASET: VTTriCam
    DO_PREPROCESS: False#True#False               # if first time, should be true
    DATA_FORMAT: NDCHW
    DATA_PATH: "/projects/abbott_lab/BVP/BVP/rPPG-Toolbox-main/newFolder_all_vids/all"                     # Raw dataset path, need to be updated
    CACHED_PATH: "/projects/cesca-cv/rppg_preproc"    # Processed dataset save path, need to be updated
    EXP_DATA_NAME: "VTTriCam_VTTriCam_PURE_EFFICIENTPHYS_train_RGB"
    BEGIN: 0.8
    END: 1.0
    PREPROCESS:
      DATA_TYPE: ['Standardized' ]
      DATA_AUG: ['None']    # 'None' or 'Motion' is supported, used if the data path points to an augmented dataset or requires augmentation
      LABEL_TYPE: DiffNormalized
      DO_CHUNK: True
      CHUNK_LENGTH: 360
      CROP_FACE:
        DO_CROP_FACE: True
        BACKEND: 'HC'    # HC for Haar Cascade, Y5F for YOLO5Face
        USE_LARGE_FACE_BOX: True
        LARGE_BOX_COEF: 1.5
        DETECTION:
          DO_DYNAMIC_DETECTION: False
          DYNAMIC_DETECTION_FREQUENCY : 30
          USE_MEDIAN_FACE_BOX: False    # This should be used ONLY if dynamic detection is used
      RESIZE:
        H: 72
        W: 72
TEST:
  METRICS: ['MAE', 'RMSE', 'MAPE', 'Pearson', 'SNR', 'BA']
  USE_LAST_EPOCH: False#True                      # to use provided validation dataset to find the best epoch, should be false
  OUTPUT_SAVE_DIR:  "/projects/abbott_lab/BVP/BVP/rppg-toolbox_new/rPPG-Toolbox/Outputs"
  DATA:
    FS: 30
    DATASET: PURE
    DO_PREPROCESS: False#True#False                    # if first time, should be true
    DATA_FORMAT: NDCHW
    DATA_PATH: "/projects/abbott_lab/BVP/BVP/pure"                     # Raw dataset path, need to be updated
    CACHED_PATH: "/projects/cesca-cv/rppg_preproc"    # Processed dataset save path, need to be updated
    EXP_DATA_NAME: "VTTriCam_VTTriCam_PURE_EFFICIENTPHYS_train_RGB"
    BEGIN: 0.0
    END: 1.0
    PREPROCESS:
      DATA_TYPE: ['Standardized']
      LABEL_TYPE: DiffNormalized
      DO_CHUNK: True
      CHUNK_LENGTH: 180
      CROP_FACE:
        DO_CROP_FACE: True
        BACKEND: 'HC'    # HC for Haar Cascade, Y5F for YOLO5Face
        USE_LARGE_FACE_BOX: True
        LARGE_BOX_COEF: 1.5
        DETECTION:
          DO_DYNAMIC_DETECTION: False
          DYNAMIC_DETECTION_FREQUENCY : 30
          USE_MEDIAN_FACE_BOX: False    # This should be used ONLY if dynamic detection is used
      RESIZE:
        H: 72
        W: 72
DEVICE: cuda:0
NUM_OF_GPU_TRAIN: 1
LOG:
  PATH: runs/exp
MODEL:
  DROP_RATE: 0.2
  NAME: EfficientPhys
  EFFICIENTPHYS:
    FRAME_DEPTH: 10
INFERENCE:
  BATCH_SIZE: 4
  EVALUATION_METHOD: FFT        # "FFT" or "peak detection"
  EVALUATION_WINDOW:
    USE_SMALLER_WINDOW: False        # Change this if you'd like an evaluation window smaller than the test video length
    WINDOW_SIZE: 10        # In seconds
  MODEL_PATH:   ""
